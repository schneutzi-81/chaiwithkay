<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#241712" />
    <title>Chai with Kay</title>
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <div class="glass" aria-hidden="true">
          <span class="glass__steam"></span>
          <span class="glass__steam"></span>
          <span class="glass__steam"></span>
          <span class="glass__cup"></span>
        </div>
        <h1>Chai with <span>Kay</span></h1>
      </div>
      <div class="stats">
        <span id="streak" title="Day streak">0🔥</span>
        <span id="progress">0 learned</span>
      </div>
    </header>

    <main class="card" id="card"></main>

    <div class="skills">
      <button class="skill skill--listen" id="listen">
        <span class="ico">🔊</span> Listen
      </button>
      <button class="skill skill--listen" id="listen-slow">
        <span class="ico">🐢</span> <span class="skill__slow">Slow</span>
      </button>
      <button class="skill skill--speak" id="speak">
        <span class="ico">🎤</span> Speak
      </button>
    </div>

    <button class="write-toggle" id="write-toggle" aria-expanded="false" aria-controls="write-panel">
      <span class="ico">✍️</span> Write it
    </button>

    <section class="write-panel" id="write-panel" hidden>
      <div class="write-stage" id="write-stage" aria-live="polite"></div>

      <div class="write-tools">
        <button class="pill" id="write-replay">↻ Replay</button>
        <label class="write-speed">
          <span aria-hidden="true">🐢</span>
          <input type="range" id="write-speed" min="0.4" max="4" step="0.1"
                 aria-label="Writing speed (left slower, right faster)" />
          <span aria-hidden="true">🐇</span>
        </label>
      </div>

      <div class="write-compare">
        <p class="write-hint">Copy it on paper, then add a photo to compare.</p>
        <input type="file" id="write-photo" accept="image/*" capture="environment" hidden />
        <button class="pill" id="write-photo-btn">📷 Add a photo</button>
        <button class="pill" id="write-retake" hidden>↺ Retake</button>
        <div class="compare" id="write-compare-view" hidden>
          <figure class="compare__cell">
            <div class="compare__model" id="compare-model" lang="hi"></div>
            <figcaption>Model</figcaption>
          </figure>
          <figure class="compare__cell">
            <img id="compare-photo" alt="Photo of your handwriting" />
            <figcaption>Yours</figcaption>
          </figure>
        </div>
      </div>
    </section>

    <p class="feedback" id="feedback" aria-live="polite"></p>

    <nav class="controls">
      <button class="nav" id="prev" aria-label="Previous">‹</button>
      <span id="position">0 / 0</span>
      <button class="pill" id="known">Got it ✓</button>
      <button class="pill" id="shuffle">Shuffle</button>
      <button class="nav" id="next" aria-label="Next">›</button>
    </nav>

    <div class="settings">
      <label>
        <input type="checkbox" id="toggle-translit" /> Show transliteration
      </label>
      <select id="level-filter" aria-label="Filter by level"></select>
      <select id="filter" aria-label="Filter by category"></select>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
